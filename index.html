<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rohan solanki</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Times New Roman', Times, serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 2rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 2.5rem;
    }

    nav a {
      color: #fff;
      text-decoration: underline;
      font-size: 18px;
      width: fit-content;
    }

    nav a:visited {
      color: #fff;
    }

    .location {
      font-size: 18px;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/bookshelf">bookshelf</a>
      <a href="/photography">photography</a>
      <a href="/sidequests">sidequests</a>
    </nav>
    <p class="location">brooklyn, ny</p>
  </div>
</body>
</html>
